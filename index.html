<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5省院校查询表 · 手机版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background: #f5f6f8; padding: 28px 20px; color: #1a1a1a; line-height: 1.6; }

.page-header { text-align: center; margin-bottom: 36px; }
.page-header h1 { font-size: 28px; color: #1a1a1a; margin-bottom: 8px; font-weight: 800; letter-spacing: 1px; }
.page-header p { font-size: 14px; color: #999; }

.section-title { font-size: 22px; font-weight: 800; margin: 40px 0 20px; color: #1a1a1a; border-left: 5px solid #dc3c28; padding-left: 14px; }
.section-subtitle { font-size: 16px; font-weight: 700; margin: 28px 0 14px; color: #333; }

.rule-section { max-width: 960px; margin: 0 auto 32px; }
.rule-block { background: #fff; border-radius: 14px; box-shadow: 0 3px 16px rgba(0,0,0,0.07); padding: 28px 32px; margin-bottom: 20px; }
.rule-block h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #1a1a1a; display: flex; align-items: center; gap: 10px; }
.rule-block h3 .num { width: 28px; height: 28px; border-radius: 50%; background: #dc3c28; color: #fff; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.rule-block p { font-size: 14px; color: #444; line-height: 1.85; margin-bottom: 10px; }
.rule-block .highlight { color: #dc3c28; font-weight: 700; }
.rule-block .blue-text { color: #2b7ae8; font-weight: 700; }

.reason-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 16px 0; }
.reason-card { background: #f8f9fa; border-radius: 10px; padding: 16px 18px; border-left: 4px solid #2b7ae8; }
.reason-card.red { border-left-color: #dc3c28; }
.reason-card h4 { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: #333; }
.reason-card p { font-size: 13px; color: #666; line-height: 1.7; margin: 0; }

.formula-block { background: #2c3e50; color: #fff; border-radius: 10px; padding: 18px 24px; margin: 16px 0; text-align: center; }
.formula-block .formula-text { font-size: 17px; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; }
.formula-block .formula-sub { font-size: 13px; opacity: 0.8; margin-top: 4px; }
.formula-inline { background: #f0f4f8; border-radius: 6px; padding: 10px 14px; font-family: "SF Mono", "Fira Code", monospace; font-size: 14px; color: #2c3e50; margin: 8px 0; display: block; }

.weight-bar { display: flex; height: 36px; border-radius: 8px; overflow: hidden; margin: 16px 0 10px; }
.weight-bar .w1 { background: linear-gradient(135deg, #4a9eff, #2b7ae8); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 700; }
.weight-bar .w2 { background: linear-gradient(135deg, #ff7a6e, #dc3c28); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 700; }

.level-scale { display: flex; height: 32px; border-radius: 6px; overflow: hidden; margin: 14px 0; }
.level-scale div { display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 600; }
.level-scale .very-easy { background: #81c784; }
.level-scale .easy { background: #66bb6a; }
.level-scale .mid { background: #ffa726; }
.level-scale .hard { background: #ef5350; }
.level-scale .extreme { background: #b71c1c; }

.data-table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 13px; }
.data-table th { background: #2c3e50; color: #fff; padding: 10px 12px; text-align: left; font-weight: 600; }
.data-table td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; color: #444; }
.data-table tr:hover { background: #f8f9fa; }
.data-table .field { font-weight: 700; color: #333; }

.plain-speak { background: #fff8e1; border-radius: 12px; padding: 20px 24px; margin: 14px 0; border: 2px solid #ffe082; }
.plain-speak .analogy { font-size: 15px; color: #5d4037; line-height: 1.9; margin-bottom: 12px; }
.plain-speak .analogy strong { color: #e65100; }
.plain-speak .step { display: flex; gap: 12px; margin: 10px 0; align-items: flex-start; }
.plain-speak .step-num { flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%; background: #ffa726; color: #fff; font-size: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
.plain-speak .step-text { font-size: 14px; color: #5d4037; line-height: 1.7; }

.legend-bar { display: flex; justify-content: center; gap: 28px; margin-bottom: 20px; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: #666; }
.legend-dot { width: 14px; height: 14px; border-radius: 3px; }
.legend-dot.yi { background: linear-gradient(135deg, #4a9eff, #2b7ae8); }
.legend-dot.tj { background: linear-gradient(135deg, #ff7a6e, #dc3c28); }

.cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1320px; margin: 0 auto; }
.card { background: #fff; border-radius: 14px; box-shadow: 0 3px 16px rgba(0,0,0,0.07); padding: 18px; }
.card-header { text-align: center; margin-bottom: 12px; }
.card-type { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; margin-bottom: 6px; }
.card-type.tA { background: #fff3e0; color: #bf360c; }
.card-type.tB { background: #e3f2fd; color: #1565c0; }
.card-type.tC { background: #e8f5e9; color: #2e7d32; }
.card-type.tD { background: #fce4ec; color: #ad1457; }
.card-type.tE { background: #f3e5f5; color: #6a1b9a; }
.card-type.tF { background: #e0f2f1; color: #00695c; }
.card-type.tG { background: #fff8e1; color: #e65100; }
.card-type.tH { background: #ffebee; color: #b71c1c; }
.card-type.tNone { background: #f5f5f5; color: #999; }
.card-title { font-size: 15px; color: #1a1a1a; font-weight: 700; margin-bottom: 3px; }
.card-city { font-size: 11px; color: #aaa; }

.diff-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-top: 6px; }
.diff-badge.very-easy { background: #e8f5e9; color: #2e7d32; }
.diff-badge.easy { background: #e8f5e9; color: #2e7d32; }
.diff-badge.mid { background: #fff8e1; color: #e65100; }
.diff-badge.hard { background: #ffebee; color: #b71c1c; }
.diff-badge.extreme { background: #b71c1c; color: #fff; }

.funnel { padding: 0 2px; }
.row { display: grid; grid-template-columns: 58px 1fr 78px; align-items: center; gap: 5px; margin-bottom: 6px; min-height: 28px; }
.row-label { font-size: 10px; color: #777; text-align: right; line-height: 1.3; padding-right: 2px; }
.bar-wrap { display: flex; align-items: center; justify-content: center; position: relative; min-width: 0; }
.bar { height: 26px; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,0.12); max-width: 70%; overflow: hidden; min-width: 26px; padding: 0 5px; white-space: nowrap; }
.bar.yi { background: linear-gradient(135deg, #4a9eff 0%, #2b7ae8 100%); }
.bar.tj { background: linear-gradient(135deg, #ff7a6e 0%, #dc3c28 100%); }
.rate { font-size: 9px; color: #666; text-align: left; line-height: 1.35; padding-left: 2px; word-break: keep-all; }
.rate strong { font-size: 11px; }
.rate.yi strong { color: #2b7ae8; }
.rate.tj strong { color: #dc3c28; }
.divider { text-align: center; font-size: 10px; color: #bbb; margin: 6px 0; padding: 4px 6px; background: #f9f9fb; border-radius: 4px; border: 1px dashed #e0e0e0; }

.score-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px 4px; margin-top: 10px; padding: 8px 10px; background: #f8f9fa; border-radius: 6px; }
.score-item { text-align: center; }
.score-item .label { font-size: 9px; color: #999; margin-bottom: 1px; }
.score-item .value { font-size: 13px; font-weight: 700; }
.score-item .value.blue { color: #2b7ae8; }
.score-item .value.red { color: #dc3c28; }
.score-item .value.dark { color: #2c3e50; }
.desc { margin-top: 8px; padding: 8px 11px; background: #f8f9fa; border-left: 3px solid #dc3c28; border-radius: 0 5px 5px 0; font-size: 11px; color: #555; line-height: 1.5; }

.type-dist { max-width: 800px; margin: 0 auto 32px; background: #fff; border-radius: 14px; box-shadow: 0 3px 16px rgba(0,0,0,0.07); padding: 24px 28px; }
.type-dist-row { display: grid; grid-template-columns: 240px 1fr 100px; align-items: center; gap: 12px; margin: 8px 0; }
.type-dist-bar-wrap { background: #f0f0f0; border-radius: 4px; height: 20px; overflow: hidden; }
.type-dist-bar { height: 100%; background: linear-gradient(135deg, #4a9eff, #2b7ae8); border-radius: 4px; }
.type-dist-count { font-size: 13px; color: #666; font-weight: 600; text-align: right; }
.type-dist-label { font-size: 13px; color: #444; }

.chart-container { max-width: 1200px; margin: 0 auto 32px; background: #fff; border-radius: 14px; box-shadow: 0 3px 16px rgba(0,0,0,0.07); padding: 24px; }
.chart-container canvas { max-height: 500px; }
.chart-stats { display: flex; justify-content: center; gap: 20px; margin: 16px 0; flex-wrap: wrap; }
.chart-stat { text-align: center; padding: 10px 20px; background: #f8f9fa; border-radius: 8px; min-width: 100px; }
.chart-stat .stat-value { font-size: 22px; font-weight: 800; }
.chart-stat .stat-label { font-size: 12px; color: #999; margin-top: 2px; }

.ranking-section { max-width: 1400px; margin: 0 auto; overflow-x: auto; }
.rank-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 3px 16px rgba(0,0,0,0.07); }
.rank-table th { background: #2c3e50; color: #fff; font-size: 11px; font-weight: 600; padding: 8px 4px; text-align: center; position: sticky; top: 0; }
.rank-table td { padding: 6px 4px; font-size: 11px; text-align: center; border-bottom: 1px solid #f0f0f0; color: #333; }
.rank-table tr:hover { background: #f8f9fa; }
.rank-table .rank-num { font-weight: 700; color: #999; }
.rank-table .rank-num.top { color: #dc3c28; }
.rank-table .school-name { text-align: left; padding-left: 10px; }
.rank-table .level-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.level-tag.very-easy { background: #e8f5e9; color: #2e7d32; }
.level-tag.easy { background: #e8f5e9; color: #2e7d32; }
.level-tag.mid { background: #fff8e1; color: #e65100; }
.level-tag.hard { background: #ffebee; color: #b71c1c; }
.level-tag.extreme { background: #b71c1c; color: #fff; }
.diff-bar { display: inline-block; height: 14px; border-radius: 3px; vertical-align: middle; }
.area-tag { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 600; }
.area-tag.a { background: #e3f2fd; color: #1565c0; }
.area-tag.b { background: #fff3e0; color: #e65100; }
.score-cell { min-width: 80px; }
.filter-panel{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:14px;box-shadow:0 3px 16px rgba(0,0,0,0.07);}
.fp-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.fp-toolbar input[type=text]{flex:1;min-width:180px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;}
.fp-toolbar input[type=text]:focus{border-color:#2c3e50;}
.fp-toolbar select,.fp-toolbar button{padding:8px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:12px;cursor:pointer;color:#333;}
.fp-toolbar select:hover,.fp-toolbar button:hover{border-color:#2c3e50;}
.fp-toolbar button.active{background:#2c3e50;color:#fff;border-color:#2c3e50;}
.fp-sep{font-size:12px;color:#888;font-weight:600;}
.fp-count{margin-left:auto;font-size:12px;color:#888;white-space:nowrap;}
.fp-count b{color:#2c3e50;font-size:14px;}
.fp-filters{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:12px;}
.fp-group{display:flex;align-items:center;gap:6px;}
.fp-group>label{font-size:11px;color:#888;font-weight:600;white-space:nowrap;}
.chips{display:flex;flex-wrap:wrap;gap:4px;}
.chip{padding:3px 10px;border:1px solid #e0e0e0;border-radius:12px;font-size:11px;cursor:pointer;background:#fff;color:#666;transition:all .15s;user-select:none;}
.chip:hover{border-color:#90caf9;color:#1565c0;}
.chip.active{background:#2c3e50;color:#fff;border-color:#2c3e50;}
.fp-ranges{display:flex;flex-wrap:wrap;gap:20px;padding-top:12px;border-top:1px dashed #eee;}
.fp-range{display:flex;align-items:center;gap:6px;font-size:11px;color:#666;}
.fp-range>label{font-weight:600;color:#555;}
.fp-range>span{color:#aaa;}
.fp-range input{width:60px;padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:11px;text-align:center;outline:none;}
.fp-range input:focus{border-color:#2c3e50;}
.rank-table th.sortable{cursor:pointer;user-select:none;}
.rank-table th.sortable:hover{background:#3a5269;}
.rank-table th .arrow{font-size:9px;margin-left:2px;opacity:.4;font-weight:400;}
.rank-table th.sorted{background:#1a252f;}
.rank-table th.sorted .arrow{opacity:1;}
.tuit-cell{font-weight:600;color:#1565c0;white-space:nowrap;}
.rank-table th{white-space:nowrap;}
.fp-toggle{display:none;}

.type-click { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; user-select: none; border: 1px solid transparent; }
.type-click:hover { transform: scale(1.15); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.type-click.tA { background: #fff3e0; color: #bf360c; border-color: #ffe0b2; }
.type-click.tB { background: #e3f2fd; color: #1565c0; border-color: #bbdefb; }
.type-click.tC { background: #e8f5e9; color: #2e7d32; border-color: #c8e6c9; }
.type-click.tD { background: #fce4ec; color: #ad1457; border-color: #f8bbd0; }
.type-click.tE { background: #f3e5f5; color: #6a1b9a; border-color: #e1bee7; }
.type-click.tF { background: #e0f2f1; color: #00695c; border-color: #b2dfdb; }
.type-click.tG { background: #fff8e1; color: #e65100; border-color: #ffe082; }
.type-click.tH { background: #ffebee; color: #b71c1c; border-color: #ffcdd2; }
.type-click.t? { background: #f5f5f5; color: #999; border-color: #e0e0e0; }
.type-click.tNone { background: #f5f5f5; color: #999; border-color: #e0e0e0; }
.type-click.tUNKNOWN { background: #f5f5f5; color: #999; border-color: #e0e0e0; }

.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: flex-start; padding-top: 40px; padding-bottom: 40px; overflow-y: auto; }
.modal-overlay.active { display: flex; }
.modal-content { background: #fff; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,0.25); max-width: 640px; width: 90%; padding: 24px 28px; position: relative; animation: modalSlide 0.3s ease; }
@keyframes modalSlide { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-close { position: absolute; top: 12px; right: 16px; width: 32px; height: 32px; border-radius: 50%; background: #f0f0f0; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #666; transition: all 0.2s; }
.modal-close:hover { background: #dc3c28; color: #fff; }
.modal-header { text-align: center; margin-bottom: 16px; padding-right: 30px; }
.modal-header .m-type { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; margin-bottom: 6px; }
.modal-header .m-title { font-size: 18px; font-weight: 700; color: #1a1a1a; margin-bottom: 3px; }
.modal-header .m-city { font-size: 12px; color: #aaa; }
.modal-header .m-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-top: 6px; }
.modal-funnel { padding: 0 2px; }
.modal-score-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px 6px; margin-top: 14px; padding: 12px; background: #f8f9fa; border-radius: 8px; }
.modal-score-item { text-align: center; }
.modal-score-item .label { font-size: 10px; color: #999; margin-bottom: 2px; }
.modal-score-item .value { font-size: 16px; font-weight: 700; }
.modal-score-item .value.blue { color: #2b7ae8; }
.modal-score-item .value.red { color: #dc3c28; }
.modal-score-item .value.dark { color: #2c3e50; }
.modal-desc { margin-top: 10px; padding: 10px 12px; background: #f8f9fa; border-left: 3px solid #dc3c28; border-radius: 0 5px 5px 0; font-size: 12px; color: #555; line-height: 1.6; }

.modal-info { margin-top: 14px; }
.modal-info-title { font-size: 13px; font-weight: 700; color: #333; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 6px; }
.modal-info-title .icon { width: 16px; height: 16px; background: #2b7ae8; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
.info-item { display: flex; align-items: baseline; gap: 6px; font-size: 12px; padding: 3px 0; }
.info-item .info-label { color: #999; white-space: nowrap; flex-shrink: 0; }
.info-item .info-value { color: #333; font-weight: 600; }
.info-item .info-value.highlight { color: #dc3c28; }
.info-item.full { grid-column: 1 / -1; }
.info-item .info-value.long { word-break: break-all; line-height: 1.5; }

.modal-analysis { margin-top: 12px; padding: 10px 12px; background: #fff8e1; border-radius: 8px; border-left: 3px solid #ffa726; font-size: 12px; color: #5d4037; line-height: 1.7; }
.modal-analysis .analysis-title { font-weight: 700; margin-bottom: 4px; color: #e65100; }

.modal-detail { margin-top: 12px; }
.modal-detail-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: #2b7ae8; cursor: pointer; padding: 6px 0; user-select: none; }
.modal-detail-toggle:hover { text-decoration: underline; }
.modal-detail-toggle .arrow { transition: transform 0.2s; font-size: 10px; }
.modal-detail-toggle.open .arrow { transform: rotate(90deg); }
.modal-detail-body { display: none; margin-top: 8px; }
.modal-detail-body.open { display: block; }
.modal-detail-section { margin-bottom: 10px; }
.modal-detail-section .d-title { font-size: 11px; font-weight: 700; color: #999; margin-bottom: 3px; }
.modal-detail-section .d-content { font-size: 12px; color: #444; line-height: 1.7; padding: 6px 10px; background: #f8f9fa; border-radius: 6px; white-space: pre-line; }

.modal-remark { margin-top: 10px; padding: 8px 10px; background: #fff3e0; border-radius: 6px; font-size: 11px; color: #e65100; line-height: 1.6; }

/* Pyramid - mobile-first layout */
.pyramid-container { max-width: 1000px; margin: 0 auto 32px; background: #fff; border-radius: 14px; box-shadow: 0 3px 16px rgba(0,0,0,0.07); padding: 14px 12px; }
.pyramid-wrap { position: relative; padding: 6px 0; }
.pyramid-row { display: flex; align-items: center; justify-content: center; margin: 2px 0; transition: all 0.3s; }
.pyramid-bar { height: 24px; border-radius: 4px; transition: all 0.3s; cursor: default; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.pyramid-bar:hover { transform: scaleY(1.1); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.pyramid-label { position: absolute; left: 0; font-size: 10px; color: #888; width: 78px; text-align: right; padding-right: 6px; line-height: 1.2; white-space: nowrap; z-index: 1; }
.pyramid-label .pl-range { font-weight: 600; color: #555; font-size: 10px; }
.pyramid-label .pl-count { font-size: 9px; color: #aaa; margin-left: 3px; }
.pyramid-diff { position: absolute; right: 0; font-size: 10px; font-weight: 700; width: 32px; text-align: left; padding-left: 4px; }
.pyramid-axis { display: flex; justify-content: space-between; padding: 0 36px 0 86px; margin-top: 6px; font-size: 9px; color: #aaa; }
.pyramid-direction { text-align: center; font-size: 10px; color: #aaa; margin-bottom: 6px; }
@media (min-width: 600px) {
  .pyramid-container { padding: 20px 24px; }
  .pyramid-wrap { padding: 8px 0; }
  .pyramid-row { margin: 1px 0; }
  .pyramid-bar { height: 28px; }
  .pyramid-label { width: 90px; font-size: 11px; padding-right: 8px; }
  .pyramid-label .pl-range { font-size: 11px; }
  .pyramid-label .pl-count { font-size: 10px; }
  .pyramid-diff { width: 38px; font-size: 11px; padding-left: 6px; }
  .pyramid-axis { padding: 0 44px 0 100px; margin-top: 8px; font-size: 10px; }

    '<div class="m-title">' + s.name + ' ' + s.major + '</div>' +

  } else {
    w = fu / maxVal * 70;

  infoHtml += '<div class="info-item"><span class="info-label">学制</span><span class="info-value">' + esc(s.duration) + ' 年</span></div>';
  var tuitionStr = s.tuition ? s.tuition + ' 万元' : '-';
  infoHtml += '<div class="info-item"><span class="info-label">总学费</span><span class="info-value highlight">' + tuitionStr + '</span></div>';
  infoHtml += '<div class="info-item"><span class="info-label">大专可报</span><span class="info-value highlight">' + esc(s.college_diploma) + '</span></div>';

    infoHtml += '<div class="info-item full"><span class="info-label">研究方向</span><span class="info-value long">' + esc(s.research_dir) + '</span></div>';
  }
  infoHtml += '<div class="info-item"><span class="info-label">上课地点</span><span class="info-value">' + esc(s.class_location) + '</span></div>';
  infoHtml += '<div class="info-item"><span class="info-label">上课方式</span><span class="info-value">' + esc(s.class_mode) + '</span></div>';
  infoHtml += '<div class="info-item"><span class="info-label">退役计划</span><span class="info-value">' + esc(s.veteran) + '</span></div>';
  infoHtml += '<div class="info-item"><span class="info-label">少骨计划</span><span class="info-value">' + esc(s.minority) + '</span></div>';
  if (s.other_info) infoHtml += '<div class="info-item full"><span class="info-label">其他</span><span class="info-value">' + esc(s.other_info) + '</span></div>';
  infoHtml += '<div class="info-item"><span class="info-label">调剂</span><span class="info-value">' + esc(s.transfer_status) + '</span></div>';
  infoHtml += '<div class="info-item"><span class="info-label">拟招生</span><span class="info-value">' + (s.plan||'-') + ' 人</span></div>';
  infoHtml += '<div class="info-item"><span class="info-label">复试线</span><span class="info-value highlight">' + (s.total_score||'-') + ' 分</span></div>';
  if (s.score_diff) infoHtml += '<div class="info-item"><span class="info-label">分差(超国家线)</span><span class="info-value">' + esc(s.score_diff) + '</span></div>';
  if (s.english2) infoHtml += '<div class="info-item"><span class="info-label">英语二</span><span class="info-value">' + esc(s.english2) + '</span></div>';
  if (s.score_diff1) infoHtml += '<div class="info-item"><span class="info-label">英语二分差</span><span class="info-value">' + esc(s.score_diff1) + '</span></div>';
  if (s.management) infoHtml += '<div class="info-item"><span class="info-label">管理综合</span><span class="info-value">' + esc(s.management) + '</span></div>';
  if (s.score_diff2) infoHtml += '<div class="info-item"><span class="info-label">管理综合分差</span><span class="info-value">' + esc(s.score_diff2) + '</span></div>';
  infoHtml += '<div class="info-item"><span class="info-label">一志愿进复试</span><span class="info-value">' + (s.fu||0) + ' 人</span></div>';
  infoHtml += '<div class="info-item"><span class="info-label">一志愿录取</span><span class="info-value">' + (s.lu||0) + ' 人</span></div>';
  if (s.admission_rate) infoHtml += '<div class="info-item"><span class="info-label">录取率</span><span class="info-value">' + esc(s.admission_rate) + '</span></div>';
  if (s.ming) infoHtml += '<div class="info-item"><span class="info-label">调剂名额</span><span class="info-value">' + s.ming + ' 人</span></div>';
  if (s.tjf) infoHtml += '<div class="info-item"><span class="info-label">调剂进复试</span><span class="info-value">' + s.tjf + ' 人</span></div>';
  if (s.tjl) infoHtml += '<div class="info-item"><span class="info-label">调剂录取</span><span class="info-value">' + s.tjl + ' 人</span></div>';
  if (s.tj_admission_rate) infoHtml += '<div class="info-item"><span class="info-label">调剂录取率</span><span class="info-value">' + esc(s.tj_admission_rate) + '</span></div>';
  if (s.rounds) infoHtml += '<div class="info-item"><span class="info-label">调剂轮次</span><span class="info-value">' + esc(s.rounds) + '</span></div>';
  if (s.qualifying_score) infoHtml += '<div class="info-item"><span class="info-label">复试资格线</span><span class="info-value">' + esc(s.qualifying_score) + '</span></div>';
  if (s.yi_score_diff) infoHtml += '<div class="info-item"><span class="info-label">一志愿分差</span><span class="info-value">' + esc(s.yi_score_diff) + '</span></div>';
  infoHtml += '</div>';
  document.getElementById('modalInfo').innerHTML = infoHtml;

  // 录取分析
  if (s.admission_analysis) {
    document.getElementById('modalAnalysis').innerHTML = '<div class="analysis-title">录取分析</div>' + s.admission_analysis.replace(/；/g, '<br>');
    document.getElementById('modalAnalysis').style.display = 'block';
  } else {
    document.getElementById('modalAnalysis').style.display = 'none';
  }

  // 复试信息（可折叠）
  var hasDetail = s.written_exam || s.interview_content || s.interview_form || s.score_calc || s.total_calc || s.reference_books;
  if (hasDetail) {
    var detailHtml = '<div class="modal-detail-toggle" onclick="toggleDetail(this)"><span class="arrow">▶</span> 复试详细信息</div>';
    detailHtml += '<div class="modal-detail-body">';
    if (s.written_exam) detailHtml += '<div class="modal-detail-section"><div class="d-title">笔试内容</div><div class="d-content">' + esc(s.written_exam) + '</div></div>';
    if (s.interview_content) detailHtml += '<div class="modal-detail-section"><div class="d-title">面试内容</div><div class="d-content">' + esc(s.interview_content) + '</div></div>';
    if (s.interview_form) detailHtml += '<div class="modal-detail-section"><div class="d-title">面试形式</div><div class="d-content">' + esc(s.interview_form) + '</div></div>';
    if (s.reference_books) detailHtml += '<div class="modal-detail-section"><div class="d-title">参考书目范围</div><div class="d-content">' + esc(s.reference_books) + '</div></div>';
    if (s.score_calc) detailHtml += '<div class="modal-detail-section"><div class="d-title">成绩计算方式</div><div class="d-content">' + esc(s.score_calc) + '</div></div>';
    if (s.total_calc) detailHtml += '<div class="modal-detail-section"><div class="d-title">总分计算方式</div><div class="d-content">' + esc(s.total_calc) + '</div></div>';
    detailHtml += '</div>';
    document.getElementById('modalDetail').innerHTML = detailHtml;
    document.getElementById('modalDetail').style.display = 'block';
  } else {
    document.getElementById('modalDetail').style.display = 'none';
  }

  // 调剂录取分析
  if (s.tj_admission_analysis) {
    var tjHtml = '<div class="analysis-title" style="margin-top:12px">调剂录取分析</div>' + esc(s.tj_admission_analysis).replace(/；/g, '<br>');
    var existingAnalysis = document.getElementById('modalAnalysis');
    if (existingAnalysis.style.display !== 'none') {
      existingAnalysis.innerHTML += '<br><br>' + tjHtml;
    } else {
      existingAnalysis.innerHTML = tjHtml;
      existingAnalysis.style.display = 'block';
    }
  }

  // 备注
  if (s.remark) {
    document.getElementById('modalRemark').innerHTML = '备注：' + s.remark;
    document.getElementById('modalRemark').style.display = 'block';
  } else {
    document.getElementById('modalRemark').style.display = 'none';
  }

  // Show modal
  document.getElementById('schoolModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  document.getElementById('schoolModal').classList.remove('active');
  document.body.style.overflow = '';
}

function closeModalBtn() {
  document.getElementById('schoolModal').classList.remove('active');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModalBtn();
});

function toggleDetail(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}
</script>
<script>
function runApp(){
  var DATA=schoolsData;
  var LV={'很容易':0,'容易':1,'中等':2,'较难':3,'很难':4};
  var LVCLS={'很容易':'very-easy','容易':'easy','中等':'mid','较难':'hard','很难':'extreme'};
  function tLabel(t){return (!t||t==='none')?'—':t;}
  function tCls(t){if(!t||t==='none')return 'tNone';return 't'+t;}
  function barColor(d){return d<1.6?'#81c784':d<3?'#66bb6a':d<5?'#ffa726':d<6.5?'#ef5350':'#b71c1c';}
  function val(s,k){if(k==='tuition')return parseFloat(s.tuition)||0;if(k==='level')return LV[s.level];if(k==='yi_ratio_real')return (s.no_applicant||s.fu===0)?-1:(s.yi_ratio_real||0);if(k==='duration')return parseFloat(s.duration)||0;if(k==='difficulty')return s.difficulty;if(k==='comp_score')return s.comp_score;if(k==='diff_score')return s.diff_score;if(k==='total_score')return s.total_score;if(k==='plan')return s.plan;var v=s[k];return typeof v==='number'?v:String(v);}
  var state={q:'',sortKey:'difficulty',sortDir:'asc',sel:{major:{},province:{},area:{},level:{},type:{},study_mode:{},class_mode:{},college_diploma:{}},dMin:'',dMax:'',sMin:'',sMax:'',tMin:'',tMax:'',durMin:'',durMax:''};
  var opts={major:['MBA','MPA','MEM','MTA'],province:['四川','重庆','云南','贵州','陕西'],area:['A','B'],level:['很容易','容易','中等','较难','很难'],type:['A','B','C','D','E','F','G','H'],study_mode:['非全日制','全日制','半全日制'],college_diploma:['可报','不可报'],class_mode:['周末班','隔周周末班','月度集中班','学期集中班','晚班','周中+周末半脱产','周一至周五全脱产','线上+线下集中班']};
  var cats=[['major','专业'],['province','省份'],['area','区'],['study_mode','学习方式'],['class_mode','上课方式'],['college_diploma','大专'],['level','难度'],['type','类型']];
  var ch='';
  cats.forEach(function(c){var cat=c[0],lb=c[1];ch+='<div class="fp-group"><label>'+lb+'</label><div class="chips" data-cat="'+cat+'">';opts[cat].forEach(function(o){ch+='<span class="chip" data-cat="'+cat+'" data-val="'+o+'">'+o+'</span>';});ch+='</div></div>';});
  document.getElementById('fpChips').innerHTML=ch;
  function anySel(cat){for(var k in state.sel[cat])if(state.sel[cat][k])return true;return false;}
  function filter(){var out=[];for(var i=0;i<DATA.length;i++){var s=DATA[i];if(state.q&&s.name.indexOf(state.q)<0)continue;if(anySel('major')&&!state.sel.major[s.major])continue;if(anySel('province')&&!state.sel.province[s.province])continue;if(anySel('area')&&!state.sel.area[s.area])continue;if(anySel('study_mode')&&!state.sel.study_mode[s.study_mode])continue;if(anySel('class_mode')){var cm=s.class_mode||'';var mm=false;for(var kk in state.sel.class_mode){if(state.sel.class_mode[kk]&&cm.indexOf(kk)>=0){mm=true;break;}}if(!mm)continue;}if(anySel('college_diploma')&&!state.sel.college_diploma[s.college_diploma])continue;if(anySel('level')&&!state.sel.level[s.level])continue;if(anySel('type')&&!state.sel.type[s.type])continue;var d=s.difficulty,sc=s.total_score,tu=parseFloat(s.tuition)||0,dur=parseFloat(s.duration)||0;if(state.dMin&&d<+state.dMin)continue;if(state.dMax&&d>+state.dMax)continue;if(state.sMin&&sc<+state.sMin)continue;if(state.sMax&&sc>+state.sMax)continue;if(state.tMin&&tu<+state.tMin)continue;if(state.tMax&&tu>+state.tMax)continue;if(state.durMin&&dur<+state.durMin)continue;if(state.durMax&&dur>+state.durMax)continue;out.push(i);}return out;}
  function esc(t){if(!t)return '-';return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function render(){var idxs=filter();idxs.sort(function(a,b){var va=val(DATA[a],state.sortKey),vb=val(DATA[b],state.sortKey);var r;if(typeof va==='number'&&typeof vb==='number')r=va-vb;else r=String(va).localeCompare(String(vb),'zh');return state.sortDir==='asc'?r:-r;});var html='';for(var r2=0;r2<idxs.length;r2++){var i=idxs[r2],s=DATA[i],top=r2<3?' top':'',d=s.difficulty;var rr=(s.no_applicant||s.fu===0)?'无人报考':((s.yi_ratio_real!==null&&s.yi_ratio_real!==undefined)?(+s.yi_ratio_real).toFixed(2):'—');var smTag=s.study_mode==='全日制'?'<span style="color:#1565c0;font-weight:600">全日制</span>':s.study_mode==='半全日制'?'<span style="color:#e65100;font-weight:600">半全</span>':s.study_mode;var cdTag=s.college_diploma==='可报'?'<span style="color:#2e7d32">可报</span>':'<span style="color:#b71c1c">不可报</span>';html+='<tr><td class="rank-num'+top+'">'+(r2+1)+'</td><td class="school-name">'+esc(s.name)+'<br><span style="font-size:10px;color:#bbb">'+esc(s.school_code||'')+'</span></td><td>'+s.major+'</td><td>'+s.province+'</td><td><span class="area-tag '+s.area.toLowerCase()+'">'+s.area+'区</span></td><td>'+smTag+'</td><td>'+s.duration+'</td><td class="tuit-cell">'+(parseFloat(s.tuition)||0).toFixed(1)+'</td><td>'+cdTag+'</td><td><span class="level-tag '+LVCLS[s.level]+'">'+s.level+'</span></td><td>'+rr+'</td><td>'+s.total_score+'</td><td class="score-cell"><div class="diff-bar" style="width:'+Math.round(d*10)+'%;background:'+barColor(d)+'"></div></td><td><strong>'+d.toFixed(2)+'</strong></td><td>'+s.comp_score.toFixed(1)+'</td><td>'+s.diff_score.toFixed(1)+'</td><td><span class="type-click '+tCls(s.type)+'" data-idx="'+i+'" onclick="showSchoolFunnel('+i+')">'+tLabel(s.type)+'</span></td></tr>';}document.getElementById('rankBody').innerHTML=html;document.getElementById('fpCount').textContent=idxs.length;var ths=document.querySelectorAll('.rank-table th.sortable');for(var t=0;t<ths.length;t++){var k=ths[t].getAttribute('data-key');var isOn=(k===state.sortKey);ths[t].classList.toggle('sorted',isOn);var ar=ths[t].querySelector('.arrow');if(ar)ar.textContent=isOn?(state.sortDir==='asc'?'▲':'▼'):'↕';}var sel=document.getElementById('fpSortKey');if(sel)sel.value=state.sortKey;var bd=document.getElementById('fpSortDir');if(bd){bd.textContent=state.sortDir==='asc'?'↑ 升序':'↓ 降序';}}
  document.getElementById('fpSearch').addEventListener('input',function(e){state.q=e.target.value.trim();render();});
  document.getElementById('fpSortKey').addEventListener('change',function(e){state.sortKey=e.target.value;render();});
  document.getElementById('fpSortDir').addEventListener('click',function(){state.sortDir=state.sortDir==='asc'?'desc':'asc';render();});
  document.getElementById('fpReset').addEventListener('click',function(){state.q='';state.sortKey='difficulty';state.sortDir='asc';state.sel={major:{},province:{},area:{},level:{},type:{},study_mode:{},class_mode:{},college_diploma:{}};state.dMin=state.dMax=state.sMin=state.sMax=state.tMin=state.tMax=state.durMin=state.durMax='';document.getElementById('fpSearch').value='';['dMin','dMax','sMin','sMax','tMin','tMax','durMin','durMax'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});var ch2=document.querySelectorAll('.chip.active');for(var i=0;i<ch2.length;i++)ch2[i].classList.remove('active');render();});
  document.getElementById('fpChips').addEventListener('click',function(e){var el=e.target;if(el.classList.contains('chip')){var cat=el.getAttribute('data-cat'),v=el.getAttribute('data-val');if(state.sel[cat][v])delete state.sel[cat][v];else state.sel[cat][v]=true;el.classList.toggle('active');render();}});
  ['dMin','dMax','sMin','sMax','tMin','tMax','durMin','durMax'].forEach(function(id){var el=document.getElementById(id);if(el)el.addEventListener('input',function(e){state[id]=e.target.value.trim();render();});});
  var ths2=document.querySelectorAll('.rank-table th.sortable');for(var i=0;i<ths2.length;i++){ths2[i].addEventListener('click',function(){var k=this.getAttribute('data-key');if(state.sortKey===k)state.sortDir=state.sortDir==='asc'?'desc':'asc';else{state.sortKey=k;state.sortDir='asc';}render();});}
  (function(){var LS_KEY='fp_collapsed_v1';var panel=document.getElementById('filterPanel');var btn=document.getElementById('fpToggle');if(!panel||!btn)return;var saved=null;try{saved=localStorage.getItem(LS_KEY);}catch(e){}if(saved==='0')panel.classList.remove('fp-collapsed');else if(saved==='1')panel.classList.add('fp-collapsed');function sync(){var open=!panel.classList.contains('fp-collapsed');var lbl=btn.querySelector('.fp-toggle-label');if(lbl)lbl.textContent=open?'收起筛选':'更多筛选';btn.setAttribute('aria-expanded',open?'true':'false');}sync();btn.addEventListener('click',function(){panel.classList.toggle('fp-collapsed');try{localStorage.setItem(LS_KEY,panel.classList.contains('fp-collapsed')?'1':'0');}catch(e){}sync();});})();
  render();
}
</script>

<script>
(async function(){
  var LS_KEY='yzd_pw_v1';
  var gate=document.getElementById('pwGate');
  var input=document.getElementById('pwInput');
  var btn=document.getElementById('pwOk');
  var err=document.getElementById('pwErr');
  async function tryUnlock(pw){
    try{
      var blob=Uint8Array.from(atob(schoolsData_ciphertext),function(c){return c.charCodeAt(0);});
      var salt=blob.slice(0,16),iv=blob.slice(16,28),ct=blob.slice(28);
      var kmat=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
      var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:200000,hash:'SHA-256'},kmat,{name:'AES-GCM',length:256},false,['decrypt']);
      var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct);
      window.schoolsData=JSON.parse(new TextDecoder().decode(pt));
      return true;
    }catch(e){return false;}
  }
  async function unlockAndRun(pw){
    if(await tryUnlock(pw)){
      try{localStorage.setItem(LS_KEY,pw);}catch(e){}
      if(gate)gate.remove();
      if(typeof runApp==='function')runApp();
      return true;
    }
    return false;
  }
  var saved=null;
  try{saved=localStorage.getItem(LS_KEY);}catch(e){}
  if(saved&&await unlockAndRun(saved))return;
  input.focus();
  btn.addEventListener('click',async function(){
    err.style.visibility='hidden';
    var ok=await unlockAndRun(input.value);
    if(!ok){err.style.visibility='visible';input.value='';input.focus();}
  });
  input.addEventListener('keydown',function(e){if(e.key==='Enter')btn.click();});
})();
</script>
