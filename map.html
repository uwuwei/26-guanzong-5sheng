<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5省院校分布地图 · 川渝云贵陕 MBA/MPA/MEM/MTA</title>
<link rel="stylesheet" href="./assets/leaflet-1.9.4/leaflet.css">
<script src="./assets/leaflet-1.9.4/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f6f8; color: #1a1a1a; line-height: 1.5; padding: 10px 16px 16px; }
body.embed { padding: 8px 12px 12px; background: transparent; }
body.embed .page-header { display: none; }

.page-header { text-align: center; margin-bottom: 10px; padding: 4px 0; }
.page-header h1 { font-size: 22px; color: #1a1a1a; font-weight: 800; letter-spacing: 1px; }
.page-header p { font-size: 12px; color: #888; margin-top: 4px; }

.kpi-strip{max-width:1600px;margin:0 auto 10px;display:grid;grid-template-columns:repeat(5,1fr);gap:0;background:#fff;border-radius:12px;padding:12px 16px;box-shadow:0 4px 18px rgba(0,0,0,0.09);position:sticky;top:6px;z-index:100;}
.kpi-item{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 8px;border-right:1px solid #eef0f3;min-height:56px;}
.kpi-item:last-child{border-right:none;}
.kpi-value{font-size:22px;font-weight:800;color:#2c3e50;line-height:1.15;letter-spacing:.3px;}
.kpi-value.small{font-size:16px;}
.kpi-value .dist{display:inline-flex;gap:3px;font-size:13px;}
.kpi-value .dist span{padding:1px 7px;border-radius:10px;font-weight:700;line-height:1.4;min-width:22px;text-align:center;}
.kpi-value .dist .l1{background:#e8f5e9;color:#2e7d32;}
.kpi-value .dist .l2{background:#c8e6c9;color:#1b5e20;}
.kpi-value .dist .l3{background:#fff3e0;color:#e65100;}
.kpi-value .dist .l4{background:#ffcdd2;color:#b71c1c;}
.kpi-value .dist .l5{background:#b71c1c;color:#fff;}
.kpi-label{font-size:11px;color:#888;margin-top:6px;text-align:center;line-height:1.3;font-weight:600;}

.crumb-strip{max-width:1600px;margin:0 auto 12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:12px;padding:0 8px;min-height:20px;}
.crumb-strip:empty{margin:0;min-height:0;}
.crumb-prefix{color:#888;font-weight:600;font-size:11px;margin-right:2px;}
.crumb-chip{display:inline-flex;align-items:center;gap:4px;background:#eef2f6;color:#2c3e50;padding:3px 9px;border-radius:14px;font-weight:600;cursor:pointer;border:1px solid #dfe4e8;transition:all .15s;}
.crumb-chip:hover{background:#dc3c28;color:#fff;border-color:#dc3c28;}
.crumb-chip .x{opacity:.6;font-size:11px;font-weight:800;margin-left:2px;}
.crumb-chip .cat{color:#888;font-weight:400;font-size:11px;margin-right:1px;}
.crumb-chip:hover .cat{color:rgba(255,255,255,.85);}
.crumb-clear{background:transparent;color:#dc3c28;border:1px solid #dc3c28;padding:2px 10px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;margin-left:auto;}
.crumb-clear:hover{background:#dc3c28;color:#fff;}

.main-grid{max-width:1600px;margin:0 auto;display:grid;grid-template-columns:260px 260px 1fr;gap:12px;}

.filter-panel{background:#fff;border-radius:12px;padding:14px;box-shadow:0 3px 16px rgba(0,0,0,0.07);height:fit-content;position:sticky;top:104px;max-height:calc(100vh - 120px);overflow-y:auto;}
.fp-toolbar{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px dashed #eef0f3;}
.fp-toolbar input[type=text]{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;}
.fp-toolbar input[type=text]:focus{border-color:#2c3e50;}
.fp-toolbar .row{display:flex;gap:6px;flex-wrap:wrap;}
.fp-toolbar select,.fp-toolbar button{padding:6px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:#333;}
.fp-toolbar select{flex:1;}
.fp-toolbar button.active{background:#2c3e50;color:#fff;border-color:#2c3e50;}
.fp-count{font-size:11px;color:#888;}
.fp-count b{color:#2c3e50;font-size:13px;}

.fp-filters{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.fp-group{display:flex;flex-direction:column;gap:3px;}
.fp-group>label{font-size:11px;font-weight:600;white-space:nowrap;background:#eef2f6;border:1px solid #d5dde5;border-radius:5px;padding:1px 7px;color:#37474f;align-self:flex-start;}
.chips{display:flex;flex-wrap:wrap;gap:3px;}
.chip{padding:2px 8px;border:1px solid #e0e0e0;border-radius:12px;font-size:11px;cursor:pointer;background:#fff;color:#666;transition:all .15s;user-select:none;}
.chip:hover{border-color:#90caf9;color:#1565c0;}
.chip.active{background:#3A6A72;color:#fff;border-color:#3A6A72;}

.fp-ranges{display:flex;flex-direction:column;gap:5px;padding-top:8px;border-top:1px dashed #eef0f3;}
.fp-range{display:flex;align-items:center;gap:4px;font-size:11px;color:#666;}
.fp-range>label{font-weight:600;color:#555;min-width:56px;}
.fp-range>span{color:#aaa;font-size:10px;min-width:44px;}
.fp-range input{width:52px;padding:5px 6px;border:1px solid #ddd;border-radius:6px;font-size:11px;text-align:center;outline:none;}
.fp-range input:focus{border-color:#2c3e50;}

.map-section{background:#fff;border-radius:12px;padding:14px;box-shadow:0 3px 16px rgba(0,0,0,0.07);position:sticky;top:104px;height:calc(100vh - 120px);display:flex;flex-direction:column;}
.map-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 4px;flex-shrink:0;flex-wrap:wrap;gap:4px 8px;}
.map-title{font-size:15px;font-weight:700;color:#2c3e50;}
.map-legend{display:flex;gap:14px;align-items:center;font-size:11px;color:#888;}
.map-legend .diff-scale{display:flex;align-items:center;gap:2px;}
.map-legend .diff-scale span{display:inline-block;width:14px;height:10px;}
#mapChart{width:100%;flex:1;min-height:0;border-radius:8px;overflow:hidden;background:#e8ecef;}
.map-loading{display:flex;justify-content:center;align-items:center;flex:1;color:#888;font-size:13px;}
.leaflet-container{font-family:inherit;background:#f7f8fa !important;}
.leaflet-control-zoom-slider{background:#fff;padding:10px 4px;border-radius:6px;box-shadow:0 1px 5px rgba(0,0,0,.35);margin-top:6px !important;display:flex;justify-content:center;}
.leaflet-control-zoom-slider input[type=range]{-webkit-appearance:slider-vertical;writing-mode:vertical-lr;direction:rtl;width:16px;height:140px;cursor:pointer;accent-color:#3A6A72;}
.province-label{color:#a8b1b8;font-size:16px;font-weight:600;text-align:center;letter-spacing:3px;pointer-events:none;text-shadow:0 0 4px #f7f8fa,0 0 4px #f7f8fa,0 0 4px #f7f8fa;}
.city-label{color:#5a6570;font-size:11px;font-weight:500;text-align:center;pointer-events:none;white-space:nowrap;text-shadow:0 0 3px #f7f8fa,0 0 3px #f7f8fa,0 1px 2px rgba(0,0,0,.06);}
.bubble-label{pointer-events:none;}
.bubble-label div{color:#fff;font-size:11px;font-weight:800;text-align:center;line-height:1;text-shadow:0 1px 2px rgba(0,0,0,.6),0 0 2px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;height:100%;letter-spacing:.2px;}
.leaflet-tooltip.bubble-tip{background:#2c3e50;color:#fff;border:none;border-radius:6px;padding:8px 12px;font-size:12px;line-height:1.6;box-shadow:0 4px 16px rgba(0,0,0,.25);white-space:nowrap;}
.leaflet-tooltip.bubble-tip::before{border-top-color:#2c3e50;}
.leaflet-tooltip.bubble-tip b{color:#fff;font-weight:700;}
.leaflet-tooltip.bubble-tip .diff-num{font-weight:800;padding:1px 6px;border-radius:4px;color:#fff;}

.schools-section{background:#fff;border-radius:12px;padding:12px;box-shadow:0 3px 16px rgba(0,0,0,0.07);position:sticky;top:104px;max-height:calc(100vh - 120px);display:flex;flex-direction:column;}
.schools-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;padding-bottom:8px;border-bottom:1px dashed #eef0f3;flex-shrink:0;flex-wrap:wrap;gap:4px 8px;}
.schools-title{font-size:14px;font-weight:700;color:#2c3e50;}
.schools-title .highlight-city{color:#dc3c28;font-weight:800;margin-left:6px;font-size:12px;}
.schools-hint{font-size:10px;color:#aaa;line-height:1.4;}
.schools-grid{display:flex;flex-direction:column;gap:7px;overflow-y:auto;flex:1;padding-right:2px;}
.school-card{background:#fff;border:1px solid #eef0f3;border-radius:8px;padding:9px 11px;transition:all .15s;}
.school-card:hover{border-color:#3A6A72;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.school-card .sc-name{font-size:13px;font-weight:700;color:#1a1a1a;line-height:1.3;display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:6px;}
.school-card .sc-name .name-txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.school-card .sc-name .major-tag{font-size:11px;font-weight:600;color:#3A6A72;background:#E7F0F0;padding:1px 6px;border-radius:4px;flex-shrink:0;}
.school-card .sc-mini{display:grid;grid-template-columns:auto 1fr;gap:2px 8px;font-size:11px;}
.school-card .sc-mini .lbl{color:#999;white-space:nowrap;}
.school-card .sc-mini .val{color:#333;font-weight:600;text-align:right;}
.school-card .sc-diff{margin-top:6px;padding-top:6px;border-top:1px dashed #f0f2f5;text-align:right;}
.diff-badge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.diff-badge.very-easy{background:#e8f5e9;color:#2e7d32;}
.diff-badge.easy{background:#c8e6c9;color:#1b5e20;}
.diff-badge.mid{background:#fff3e0;color:#e65100;}
.diff-badge.hard{background:#ffcdd2;color:#b71c1c;}
.diff-badge.extreme{background:#b71c1c;color:#fff;}

.footer-note{max-width:1600px;margin:14px auto 0;padding:10px 14px;background:#fff8e1;border-left:3px solid #ffa726;border-radius:6px;font-size:12px;color:#e65100;line-height:1.6;}

/* --- 单校详情 modal (从 pc.html 抽出) --- */
.row{display:grid;grid-template-columns:58px 1fr 78px;align-items:center;gap:5px;margin-bottom:6px;min-height:28px;}
.row-label{font-size:10px;color:#777;text-align:right;line-height:1.3;padding-right:2px;}
.bar-wrap{display:flex;align-items:center;justify-content:center;position:relative;min-width:0;}
.bar{height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,0.12);max-width:70%;overflow:hidden;min-width:26px;padding:0 5px;white-space:nowrap;}
.bar.yi{background:linear-gradient(135deg,#4a9eff 0%,#2b7ae8 100%);}
.bar.tj{background:linear-gradient(135deg,#ff7a6e 0%,#dc3c28 100%);}
.rate{font-size:9px;color:#666;text-align:left;line-height:1.35;padding-left:2px;word-break:keep-all;}
.rate strong{font-size:11px;}
.rate.yi strong{color:#2b7ae8;}
.rate.tj strong{color:#dc3c28;}
.divider{text-align:center;font-size:10px;color:#bbb;margin:6px 0;padding:4px 6px;background:#f9f9fb;border-radius:4px;border:1px dashed #e0e0e0;}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;justify-content:center;align-items:flex-start;padding-top:40px;padding-bottom:40px;overflow-y:auto;}
.modal-overlay.active{display:flex;}
.modal-content{background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,0.25);max-width:640px;width:90%;padding:24px 28px;position:relative;animation:modalSlide 0.3s ease;}
@keyframes modalSlide{from{transform:translateY(-30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-close{position:absolute;top:12px;right:16px;width:32px;height:32px;border-radius:50%;background:#f0f0f0;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#666;transition:all 0.2s;}
.modal-close:hover{background:#dc3c28;color:#fff;}
.modal-header{text-align:center;margin-bottom:16px;padding-right:30px;}
.modal-header .m-type{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;margin-bottom:6px;}
.modal-header .m-title{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:3px;}
.modal-header .m-city{font-size:12px;color:#aaa;}
.modal-header .m-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:6px;}
.modal-header .m-badge.very-easy,.modal-header .m-badge.easy{background:#e8f5e9;color:#2e7d32;}
.modal-header .m-badge.mid{background:#fff8e1;color:#e65100;}
.modal-header .m-badge.hard{background:#ffebee;color:#b71c1c;}
.modal-header .m-badge.extreme{background:#b71c1c;color:#fff;}
.modal-funnel{padding:0 2px;}
.modal-score-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 6px;margin-top:14px;padding:12px;background:#f8f9fa;border-radius:8px;}
.modal-score-item{text-align:center;}
.modal-score-item .label{font-size:10px;color:#999;margin-bottom:2px;}
.modal-score-item .value{font-size:16px;font-weight:700;}
.modal-score-item .value.blue{color:#2b7ae8;}
.modal-score-item .value.red{color:#dc3c28;}
.modal-score-item .value.dark{color:#2c3e50;}
.modal-info{margin-top:14px;}
.modal-info-title{font-size:13px;font-weight:700;color:#333;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:6px;}
.modal-info-title .icon{width:16px;height:16px;background:#2b7ae8;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;}
.info-item{display:flex;align-items:baseline;gap:6px;font-size:12px;padding:3px 0;}
.info-item .info-label{color:#999;white-space:nowrap;flex-shrink:0;}
.info-item .info-value{color:#333;font-weight:600;}
.info-item .info-value.highlight{color:#dc3c28;}
.info-item.full{grid-column:1 / -1;}
.info-item .info-value.long{word-break:break-all;line-height:1.5;}
.modal-analysis{margin-top:12px;padding:10px 12px;background:#fff8e1;border-radius:8px;border-left:3px solid #ffa726;font-size:12px;color:#5d4037;line-height:1.7;}
.modal-analysis .analysis-title{font-weight:700;margin-bottom:4px;color:#e65100;}
.modal-detail{margin-top:12px;}
.modal-detail-toggle{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:#2b7ae8;cursor:pointer;padding:6px 0;user-select:none;}
.modal-detail-toggle:hover{text-decoration:underline;}
.modal-detail-toggle .arrow{transition:transform 0.2s;font-size:10px;}
.modal-detail-toggle.open .arrow{transform:rotate(90deg);}
.modal-detail-body{display:none;margin-top:8px;}
.modal-detail-body.open{display:block;}
.modal-detail-section{margin-bottom:10px;}
.modal-detail-section .d-title{font-size:11px;font-weight:700;color:#999;margin-bottom:3px;}
.modal-detail-section .d-content{font-size:12px;color:#444;line-height:1.7;padding:6px 10px;background:#f8f9fa;border-radius:6px;white-space:pre-line;}
.modal-remark{margin-top:10px;padding:8px 10px;background:#fff3e0;border-radius:6px;font-size:11px;color:#e65100;line-height:1.6;}

/* 清单卡片可点击 */
.school-card{cursor:pointer;}

@media (max-width:1200px){
  .main-grid{grid-template-columns:280px 1fr;}
  #mapChart{height:520px;}
}
@media (max-width:900px){
  .main-grid{grid-template-columns:1fr;}
  .filter-panel{position:static;max-height:none;}
  .kpi-strip{grid-template-columns:repeat(2,1fr);padding:10px;}
  .kpi-item{border-right:none;border-bottom:1px solid #eef0f3;padding:8px 4px;}
  .kpi-item:nth-last-child(-n+2){border-bottom:none;}
  .kpi-value{font-size:18px;}
  #mapChart{height:440px;}
}
</style>
</head>
<body>

<div class="page-header">
  <h1>🗺 5省院校分布地图</h1>
  <p>川渝云贵陕 · MBA/MPA/MEM/MTA · 273项招生 · 76所学校 · 2026年数据 · 校区级精度</p>
</div>

<div class="kpi-strip">
  <div class="kpi-item"><div class="kpi-value" id="kpiCount">273</div><div class="kpi-label">当前项目数</div></div>
  <div class="kpi-item"><div class="kpi-value small" id="kpiLevelDist"></div><div class="kpi-label">难度分档 · 很易/易/中/较难/很难</div></div>
  <div class="kpi-item"><div class="kpi-value" id="kpiAvgYi">—</div><div class="kpi-label">平均真实竞争比</div></div>
  <div class="kpi-item"><div class="kpi-value" id="kpiAvgScore">—</div><div class="kpi-label">平均复试线</div></div>
  <div class="kpi-item"><div class="kpi-value" id="kpiAvgTuition">—</div><div class="kpi-label">平均学费(万)</div></div>
</div>

<div class="crumb-strip" id="crumbStrip"></div>

<div class="main-grid">
  <div class="filter-panel">
    <div class="fp-toolbar">
      <input type="text" id="fpSearch" placeholder="搜索院校名称...">
      <div class="row">
        <select id="fpSortKey">
          <option value="difficulty">难度值</option>
          <option value="comp_score">竞争得分</option>
          <option value="diff_score">分数难度</option>
          <option value="total_score">复试线</option>
          <option value="tuition">学费</option>
          <option value="major">专业</option>
          <option value="province">省份</option>
        </select>
        <button id="fpSortDir" class="active">↑ 升序</button>
      </div>
      <div class="row">
        <button id="fpReset" style="flex:1;">重置筛选</button>
        <span class="fp-count">显示 <b id="fpCount">273</b> / 273 项</span>
      </div>
    </div>
    <div class="fp-filters" id="fpChips"></div>
    <div class="fp-ranges">
      <div class="fp-range"><label>难度值</label><span>1-10</span><input type="number" id="dMin" placeholder="最小" min="1" max="10" step="0.1">~<input type="number" id="dMax" placeholder="最大" min="1" max="10" step="0.1"></div>
      <div class="fp-range"><label>复试线</label><span>136-240</span><input type="number" id="sMin" placeholder="最小" min="130" max="250">~<input type="number" id="sMax" placeholder="最大" min="130" max="250"></div>
      <div class="fp-range"><label>学费(万)</label><span>1.5-35.8</span><input type="number" id="tMin" placeholder="最小" min="0" max="50" step="0.1">~<input type="number" id="tMax" placeholder="最大" min="0" max="50" step="0.1"></div>
      <div class="fp-range"><label>学制(年)</label><span>2-3</span><input type="number" id="durMin" placeholder="最小" min="2" max="3" step="0.5">~<input type="number" id="durMax" placeholder="最大" min="2" max="3" step="0.5"></div>
    </div>
  </div>

  <div class="schools-section">
    <div class="schools-header">
      <div class="schools-title">命中院校清单<span class="highlight-city" id="highlightCity"></span></div>
      <div class="schools-hint">点气泡聚焦某市 · 空白处恢复</div>
    </div>
    <div class="schools-grid" id="schoolsGrid"></div>
  </div>

  <div class="map-section">
    <div class="map-header">
      <div class="map-title">📍 5省招生项目地理分布 <span style="font-size:11px;color:#888;font-weight:400;margin-left:6px;">气泡数字=命中招生项目数 · 颜色=平均综合难度 · 点气泡看详情</span></div>
      <div class="map-legend">
        <span>难度</span>
        <div class="diff-scale">
          <span style="background:#81c784"></span>
          <span style="background:#66bb6a"></span>
          <span style="background:#ffa726"></span>
          <span style="background:#ef5350"></span>
          <span style="background:#b71c1c"></span>
        </div>
        <span>很易 → 很难</span>
      </div>
    </div>
    <div id="mapChart"></div>
  </div>
</div>

<!-- 单校详情 modal -->
<div class="modal-overlay" id="schoolModal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModalBtn()">&times;</button>
    <div class="modal-header" id="modalHeader"></div>
    <div class="modal-funnel" id="modalFunnel"></div>
    <div class="modal-score-row" id="modalScores"></div>
    <div class="modal-info" id="modalInfo"></div>
    <div class="modal-analysis" id="modalAnalysis"></div>
    <div class="modal-detail" id="modalDetail"></div>
    <div class="modal-remark" id="modalRemark"></div>
  </div>

      if(s.level in LV)dist[LV[s.level]]++;
      if(!(s.no_applicant||s.fu===0)&&s.yi_ratio_real!=null&&isFinite(+s.yi_ratio_real)){sumYi+=+s.yi_ratio_real;cntYi++;}
      if(s.total_score!=null&&isFinite(+s.total_score)){sumScore+=+s.total_score;cntScore++;}
      var tu=parseFloat(s.tuition);
      if(isFinite(tu)&&tu>0){sumTu+=tu;cntTu++;}
    }
    document.getElementById('kpiCount').textContent=n;
    document.getElementById('fpCount').textContent=n;
    document.getElementById('kpiLevelDist').innerHTML='<span class="dist"><span class="l1">'+dist[0]+'</span><span class="l2">'+dist[1]+'</span><span class="l3">'+dist[2]+'</span><span class="l4">'+dist[3]+'</span><span class="l5">'+dist[4]+'</span></span>';
    document.getElementById('kpiAvgYi').textContent=cntYi?(sumYi/cntYi).toFixed(2):'—';
    document.getElementById('kpiAvgScore').textContent=cntScore?Math.round(sumScore/cntScore):'—';
    document.getElementById('kpiAvgTuition').textContent=cntTu?(sumTu/cntTu).toFixed(1):'—';
  }

  var CAT_LABELS={major:'专业',province:'省份',city:'城市',area:'考区',study_mode:'学习方式',class_mode:'上课方式',college_diploma:'大专',veteran:'退役',minority:'少骨',level:'难度',type:'类型'};
  function renderCrumbs(){
    var chips=[];
    Object.keys(state.sel).forEach(function(cat){
      Object.keys(state.sel[cat]).forEach(function(v){
        if(state.sel[cat][v])chips.push('<span class="crumb-chip" data-cat="'+cat+'" data-val="'+esc(v)+'"><span class="cat">'+(CAT_LABELS[cat]||cat)+':</span>'+esc(v)+'<span class="x">×</span></span>');
      });
    });
    if(state.q)chips.push('<span class="crumb-chip" data-q="1"><span class="cat">搜索:</span>'+esc(state.q)+'<span class="x">×</span></span>');
    if(state.focusCity)chips.push('<span class="crumb-chip" data-focus="1" style="background:#3A6A72;color:#fff;border-color:#3A6A72;"><span class="cat" style="color:rgba(255,255,255,.75)">聚焦:</span>'+esc(state.focusCity)+'<span class="x">×</span></span>');
    var ranges=[['dMin','dMax','难度值'],['sMin','sMax','复试线'],['tMin','tMax','学费'],['durMin','durMax','学制']];
    ranges.forEach(function(r){
      if(state[r[0]]||state[r[1]]){
        var txt=(state[r[0]]||'*')+'~'+(state[r[1]]||'*');
        chips.push('<span class="crumb-chip" data-range="'+r[0]+','+r[1]+'"><span class="cat">'+r[2]+':</span>'+txt+'<span class="x">×</span></span>');
      }
    });
    var host=document.getElementById('crumbStrip');
    if(!chips.length){host.innerHTML='';return;}
    host.innerHTML='<span class="crumb-prefix">当前筛选</span>'+chips.join('')+'<button class="crumb-clear" id="crumbClear">全部清除</button>';
    document.getElementById('crumbClear').addEventListener('click',function(){document.getElementById('fpReset').click();});
    host.querySelectorAll('.crumb-chip').forEach(function(el){
      el.addEventListener('click',function(){
        var cat=this.getAttribute('data-cat'),v=this.getAttribute('data-val'),q=this.getAttribute('data-q'),rg=this.getAttribute('data-range'),fc=this.getAttribute('data-focus');
        if(cat){
          delete state.sel[cat][v];
          var chip=document.querySelector('.chip[data-cat="'+cat+'"][data-val="'+v.replace(/"/g,'\\"')+'"]');
          if(chip)chip.classList.remove('active');
        }else if(q){state.q='';document.getElementById('fpSearch').value='';}
        else if(fc){state.focusCity='';}
        else if(rg){var ks=rg.split(',');state[ks[0]]='';state[ks[1]]='';var e1=document.getElementById(ks[0]),e2=document.getElementById(ks[1]);if(e1)e1.value='';if(e2)e2.value='';}
        render();
        if(cat==='province'||cat==='city')focusMap();
      });
    });
  }

  function render(){
    if(mapReady)renderMap();
    else renderSchools();
    renderKpi();
    renderCrumbs();
  }

  document.getElementById('fpSearch').addEventListener('input',function(e){state.q=e.target.value.trim();render();});
  document.getElementById('fpSortKey').addEventListener('change',function(e){state.sortKey=e.target.value;render();});
  document.getElementById('fpSortDir').addEventListener('click',function(){state.sortDir=state.sortDir==='asc'?'desc':'asc';this.textContent=state.sortDir==='asc'?'↑ 升序':'↓ 降序';render();});
  document.getElementById('fpReset').addEventListener('click',function(){state.q='';state.sortKey='difficulty';state.sortDir='asc';state.focusCity='';state.sel={major:{},province:{},city:{},area:{},level:{},type:{},study_mode:{},class_mode:{},college_diploma:{},veteran:{},minority:{}};state.dMin=state.dMax=state.sMin=state.sMax=state.tMin=state.tMax=state.durMin=state.durMax='';document.getElementById('fpSearch').value='';document.getElementById('fpSortKey').value='difficulty';document.getElementById('fpSortDir').textContent='↑ 升序';['dMin','dMax','sMin','sMax','tMin','tMax','durMin','durMax'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});var ch2=document.querySelectorAll('.chip.active');for(var i=0;i<ch2.length;i++)ch2[i].classList.remove('active');render();focusMap();});
  document.getElementById('fpChips').addEventListener('click',function(e){var el=e.target;if(el.classList.contains('chip')){var cat=el.getAttribute('data-cat'),v=el.getAttribute('data-val');if(state.sel[cat][v])delete state.sel[cat][v];else state.sel[cat][v]=true;el.classList.toggle('active');render();if(cat==='province'||cat==='city')focusMap();}});

  // 清单卡片点击 → 只弹 modal(不 pan 地图,地图只跟筛选联动)
  document.getElementById('schoolsGrid').addEventListener('click',function(e){
    var card=e.target;
    while(card&&card!==this&&!card.classList.contains('school-card'))card=card.parentElement;
    if(!card||!card.classList.contains('school-card'))return;
    var idx=parseInt(card.getAttribute('data-idx'),10);
    if(!isNaN(idx))showSchoolFunnel(idx);
  });
  ['dMin','dMax','sMin','sMax','tMin','tMax','durMin','durMax'].forEach(function(id){var el=document.getElementById(id);if(el)el.addEventListener('input',function(e){state[id]=e.target.value.trim();render();});});

  // 首次渲染
  render();

  window.addEventListener('resize',function(){map.invalidateSize();});
  setTimeout(function(){map.invalidateSize();},80);
})();
</script>

</body>
</html>
